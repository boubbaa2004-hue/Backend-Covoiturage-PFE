# Base de donnÈes MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/covoLiv?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Port serveur
server.port=8080

# Nom application
spring.application.name=covoLiv-backend

# JWT Secret
jwt.secret=covoLiv_secret_key_2026_very_long_string
jwt.expiration=86400000
# Upload fichiers
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Dossier de stockage
app.upload.dir=C:/Users/bf322/Downloads/backend/uploads/documents